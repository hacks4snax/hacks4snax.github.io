<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hacks4Snacks</title>
  <meta name="description" content="Support and privacy information for Hacks4Snacks apps." />
  <style>
    :root { color-scheme: light; --fg:#111827; --muted:#4b5563; --line:#e5e7eb; --bg:#ffffff; --card:#f9fafb; --accent:#0f766e; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; color:var(--fg); background:var(--bg); line-height:1.6; }
    main { max-width:760px; margin:0 auto; padding:56px 20px 80px; }
    h1 { font-size:clamp(2.25rem,7vw,4rem); line-height:1; margin:0 0 16px; letter-spacing:-0.045em; }
    p { font-size:1.05rem; color:var(--muted); }
    .card { margin-top:32px; border:1px solid var(--line); background:var(--card); border-radius:18px; padding:22px; }
    a { color:var(--accent); font-weight:600; }
  </style>
</head>
<body>
<main>
  <h1>Hacks4Snacks</h1>
  <p>Small, practical apps for everyday workflows.</p>
  <section class="card">
    <p><a href="/privacy/">Privacy Policy</a></p>
    <p>For support, contact <a href="mailto:support@hacks4snacks.com">support@hacks4snacks.com</a>.</p>
  </section>
</main>
</body>
</html>
